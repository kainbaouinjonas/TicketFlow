version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ticket_db_dev
    environment:
      POSTGRES_DB: ticket_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret_db_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ticket_redis_dev
    ports:
      - "6379:6379"

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: ticket_web_dev
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=ticket_platform
      - DB_USER=postgres
      - DB_PASSWORD=secret_db_password
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SECRET_KEY=dev_secret_key
      - DJANGO_DEBUG=True
    depends_on:
      - db
      - redis

  celery:
    build:
      context: .
      dockerfile: docker/Dockerfile.celery
    container_name: ticket_celery_dev
    command: celery -A config worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - DB_NAME=ticket_platform
      - DB_USER=postgres
      - DB_PASSWORD=secret_db_password
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SECRET_KEY=dev_secret_key
      - DJANGO_DEBUG=True
    depends_on:
      - db
      - redis

volumes:
  postgres_data_dev: