name: Django Enterprise Ticketing Platform CI/CD Pipeline

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint:
    name: Code Linting & Style Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 isort

      - name: Code Style Check (Black)
        run: black --check . --exclude "/migrations/|/venv/"

      - name: Import Sorting Check (isort)
        run: isort --check-only --profile black .

      - name: Syntax & Style Linter (Flake8)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  test:
    name: Django Pytest Suite
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: ticket_db_test
          POSTGRES_USER: django_test
          POSTGRES_PASSWORD: password_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev build-essential

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest Suite
        env:
          DATABASE_URL: postgres://django_test:password_test@localhost:5432/ticket_db_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-cd-temporary-secret-key-for-testing-only-12345
          DEBUG: "False"
        run: |
          python -m pytest --ds=config.settings -v

  docker-build:
    name: Build & Push Docker Container Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Web Image
        id: meta-web
        uses: docker/metadata-action@v4
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/ticket-platform-web
          tags: |
            type=sha,format=long
            type=ref,event=branch
            latest

      - name: Extract metadata for Celery Image
        id: meta-celery
        uses: docker/metadata-action@v4
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/ticket-platform-celery
          tags: |
            type=sha,format=long
            type=ref,event=branch
            latest

      - name: Build and Push Web Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: docker/Dockerfile.web
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Celery Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: docker/Dockerfile.celery
          push: true
          tags: ${{ steps.meta-celery.outputs.tags }}
          labels: ${{ steps.meta-celery.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
