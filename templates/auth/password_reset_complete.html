{% extends 'base.html' %}
{% block title %}Mot de passe réinitialisé - TicketFlow{% endblock %}
{% block content %}
<div class="max-w-md mx-auto px-4 py-16">
    <div class="bg-white dark:bg-slate-900 border border-slate-200/80 dark:border-slate-800/80 rounded-3xl p-8 shadow-xl text-center">
        <div class="bg-emerald-500/10 w-10 h-10 rounded-2xl flex items-center justify-center mx-auto mb-3 text-xl">✅</div>
        <h1 class="text-2xl font-bold font-outfit mb-3">Mot de passe mis à jour !</h1>
        <p class="text-sm text-slate-500 dark:text-slate-400 font-light max-w-xs mx-auto mb-8">
            Votre mot de passe a été réinitialisé avec succès. Vous pouvez maintenant vous connecter avec votre nouveau mot de passe.
        </p>
        <a href="{% url 'login' %}" class="inline-block bg-brand-600 hover:bg-brand-700 text-white font-bold px-8 py-3.5 rounded-2xl transition-all shadow-lg shadow-brand-500/20">
            Se connecter
        </a>
    </div>
</div>
{% endblock %}
