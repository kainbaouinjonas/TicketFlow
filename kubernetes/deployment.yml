apiVersion: v1
kind: ConfigMap
metadata:
  name: ticket-config
  namespace: default
data:
  DJANGO_SETTINGS_MODULE: "config.settings"
  DJANGO_DEBUG: "False"
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "ticket_platform"
  REDIS_URL: "redis://redis-service:6379/0"

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: default
spec:
  ports:
    - port: 5432
  selector:
    app: postgres
  clusterIP: None

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-deployment
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
  
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_DB
              value: "ticket_platform"
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              value: "secret_db_password"
          ports:
            - containerPort: 5432

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: default
spec:
  ports:
    - port: 6379
  selector:
    app: redis

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-deployment
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379

---
apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: default
spec:
  ports:
    - port: 80
      targetPort: 8000
  selector:
    app: web

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-deployment
  namespace: default
spec:
  replicas: 3 # Horizontally Scaled
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: ticket-platform-web:latest
          command: ["daphne", "-b", "0.0.0.0", "-p", "8000", "config.asgi:application"]
          envFrom:
            - configMapRef:
                name: ticket-config
          env:
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              value: "secret_db_password"
            - name: DJANGO_SECRET_KEY
              value: "prod_django_secret_k8s"
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-deployment
  namespace: default
spec:
  replicas: 2 # Double workers
  selector:
    matchLabels:
      app: celery
  template:
    metadata:
      labels:
        app: celery
    spec:
      containers:
        - name: celery
          image: ticket-platform-celery:latest
          command: ["celery", "-A", "config", "worker", "--beat", "-l", "info"]
          envFrom:
            - configMapRef:
                name: ticket-config
          env:
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              value: "secret_db_password"
            - name: DJANGO_SECRET_KEY
              value: "prod_django_secret_k8s"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web-deployment
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ticket-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-service
                port:
                  number: 80
