global
    log stdout format raw local0 info
    maxconn 4096

defaults
    log global
    mode http
    option httplog
    option dontlognull
    retries 3
    timeout connect 5s
    timeout client 50s
    timeout server 50s

frontend http_front
    bind *:80
    # Enable WebSocket routing
    acl is_websocket hdr(Upgrade) -i WebSocket
    use_backend ws_backend if is_websocket
    
    default_backend http_backend

backend http_backend
    balance roundrobin
    option forwardfor
    server web_node1 web:8000 check

backend ws_backend
    balance roundrobin
    option forwardfor
    # WebSocket sticky session controls or direct proxying
    server ws_node1 web:8000 check
