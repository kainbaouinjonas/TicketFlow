version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ticket_db
    environment:
      POSTGRES_DB: ticket_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret_db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ticket_network

  redis:
    image: redis:7-alpine
    container_name: ticket_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ticket_network

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: ticket_web
    command: sh -c "python manage.py migrate && daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=ticket_platform
      - DB_USER=postgres
      - DB_PASSWORD=secret_db_password
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SECRET_KEY=prod_secret_key_45789_django
      - DJANGO_DEBUG=True
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ticket_network

  celery:
    build:
      context: .
      dockerfile: docker/Dockerfile.celery
    container_name: ticket_celery
    command: celery -A config worker --loglevel=info --concurrency=4
    volumes:
      - .:/app
    environment:
      - DB_NAME=ticket_platform
      - DB_USER=postgres
      - DB_PASSWORD=secret_db_password
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SECRET_KEY=prod_secret_key_45789_django
      - DJANGO_DEBUG=True
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ticket_network

  celery-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.celery
    container_name: ticket_celery_beat
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    environment:
      - DB_NAME=ticket_platform
      - DB_USER=postgres
      - DB_PASSWORD=secret_db_password
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SECRET_KEY=prod_secret_key_45789_django
      - DJANGO_DEBUG=True
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ticket_network

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:

networks:
  ticket_network:
    driver: bridge